<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=login.html">
    <title>SchoolDuty - Redireccionando...</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e3a8a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .redirect-box {
            text-align: center;
        }
        .redirect-box h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .redirect-box a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h1>SchoolDuty</h1>
        <div class="spinner"></div>
        <p>Redireccionando al login...</p>
        <p><a href="login.html">Haz clic aquí si no redirige automáticamente</a></p>
    </div>
</body>
</html>
